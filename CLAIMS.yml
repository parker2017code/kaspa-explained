last_checked: 2026-05-05
recheck_after: 2026-06-20
claims:
  proof_of_work:
    status: live
    summary: Kaspa is mined Proof of Work.
    source: https://github.com/kaspanet/rusty-kaspa
  utxo:
    status: live
    summary: Kaspa uses a UTXO model rather than an Ethereum-style account model.
    source: https://github.com/kaspanet/rusty-kaspa
  ghostdag:
    status: live
    summary: GHOSTDAG is Kaspa's live blockDAG ordering rule.
    source: https://research.kas.pa/
  crescendo_10_bps:
    status: live
    summary: Kaspa's Crescendo-era 10 BPS network is live; Michael Sutton framed throughput as roughly 8-9x higher and confirmation-time improvement around 30%, not instant finality or a clean 10x confirmation improvement.
    source: https://kaspa.org/kaspa-updates-to-crescendo-and-10bps/
  base_rtd:
    status: live_framing
    summary: Hashdag frames RTD first as Kaspa's real-time Bitcoin-style PoW value proposition.
    source: https://hashd.ag/raw
  toccata:
    status: targeted
    summary: Toccata is a targeted hard-fork track with a public June 5-20, 2026 window after the older May 5 target moved so sequencing commitments could be finalized before zk systems depend on them.
    source: https://medium.com/@michaelsuttonil/kaspa-covenants-toccata-hard-fork-outlook-a4d81a40900c
    forbidden_copy:
      - Toccata is live
  vprogs:
    status: roadmap
    summary: vProgs are app-level verifiable program architecture, not a mature live app ecosystem.
    source: https://www.youtube.com/watch?v=xHlOcR1x2tU
    forbidden_copy:
      - vProgs are live
  vprogs_solana_like_experience:
    status: roadmap_framing
    summary: Solana-like means a cohesive, Rust-friendly developer and user experience; it does not mean importing Solana execution or making L1 execute every app.
    source: https://www.youtube.com/live/GaJmYV8OHfQ
  native_defi:
    status: roadmap
    summary: Native Kaspa DeFi depends on future foundations and useful app tooling; it is not live today.
    source: https://kaspaexplained.com/why-kaspa-matters.html
    forbidden_copy:
      - Native DeFi is live
  dagknight:
    status: research
    summary: DAGKnight is a parameterless/adaptive consensus upgrade direction, not current mainnet behavior.
    source: https://hashd.ag/
    forbidden_copy:
      - DAGKnight is live
      - Kaspa has instant finality
  dagknight_latency_policy:
    status: research
    summary: DAGKnight latency settings should be reasoned from adversarial or worst-case latency assumptions, not merely smooth observed network latency.
    source: https://www.youtube.com/live/GaJmYV8OHfQ
  pruning_and_missing_history:
    status: live_design
    summary: Kaspa's consensus tracks UTXO state; spent transaction history may be pruned or absent from explorers, and that does not make Kaspa a privacy chain.
    source: https://www.youtube.com/live/GaJmYV8OHfQ
  rtd_derived_systems:
    status: research
    summary: RTD-derived oracle, TangVM, miner attestation, and coordination-market flows are downstream research or architecture ideas.
    source: https://hashd.ag/raw
    forbidden_copy:
      - TangVM is live
      - Kaspa oracle flows are live
